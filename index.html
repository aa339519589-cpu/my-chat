<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
/* 极致还原 Claude 色彩与排版体系 */
:root {
  --bg-main: #FAF9F5;
  --bg-sidebar: #F0EEE6;
  --bg-sidebar-hover: #E4E1D6;
  --text-primary: #1A1915;
  --text-secondary: #6B6960;
  --border-light: #E4E1D6;
  --accent-claude: #D97757;
  --accent-hover: #C26547;
  --msg-user: #F0EEE6;
  --font-sans: 'Söhne', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-serif: 'Tiempos', 'Source Serif Pro', Georgia, serif;
  --shadow-float: 0 4px 12px rgba(0, 0, 0, 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background-color: var(--bg-main); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; }

/* 侧边栏：完美自适应收放 */
.sidebar {
  width: 260px;
  background-color: var(--bg-sidebar);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar.collapsed {
  width: 0;
  border-right-color: transparent;
}
.sidebar-inner { width: 260px; display: flex; flex-direction: column; height: 100%; padding: 12px; }

.btn-new {
  display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 12px;
  background: transparent; border: none; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--text-primary); transition: background 0.2s;
}
.btn-new:hover { background: var(--bg-sidebar-hover); }
.claude-icon {
  width: 24px; height: 24px; border-radius: 6px; background-color: var(--accent-claude);
  color: white; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 14px;
}

/* 主内容区 */
.main-content {
  flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0;
}

/* 顶部导航 */
.top-bar {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
}
.btn-toggle {
  background: transparent; border: none; cursor: pointer; color: var(--text-secondary);
  padding: 8px; border-radius: 6px; display: flex; align-items: center;
}
.btn-toggle:hover { background: var(--border-light); color: var(--text-primary); }
.model-name { font-size: 14px; font-weight: 500; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
.model-name:hover { background: var(--bg-sidebar); }

/* 聊天区域 */
.chat-container {
  flex: 1; overflow-y: auto; padding: 24px 0 120px; scroll-behavior: smooth;
}
.chat-wrapper { max-width: 768px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; padding: 0 24px; }

.msg-row { display: flex; width: 100%; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.msg-user { justify-content: flex-end; }
.msg-user .bubble {
  background-color: var(--msg-user); padding: 12px 16px; border-radius: 16px;
  font-size: 15px; line-height: 1.6; max-width: 80%; white-space: pre-wrap;
}

.msg-ai { justify-content: flex-start; gap: 16px; }
.msg-ai .avatar {
  width: 28px; height: 28px; border-radius: 6px; background-color: var(--accent-claude);
  color: white; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 16px; flex-shrink: 0; margin-top: 4px;
}
.msg-ai .content {
  flex: 1; font-size: 15.5px; line-height: 1.65; color: var(--text-primary); overflow-wrap: anywhere;
}

/* Markdown 精调 */
.content p { margin-bottom: 1em; }
.content p:last-child { margin-bottom: 0; }
.content pre {
  background: #F6F8FA; padding: 16px; border-radius: 8px; overflow-x: auto;
  border: 1px solid var(--border-light); margin: 1em 0; position: relative;
}
.content code { font-family: ui-monospace, monospace; font-size: 0.9em; }
.content :not(pre) > code { background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; }
.content ul, .content ol { margin-left: 24px; margin-bottom: 1em; }
.content h1, .content h2, .content h3 { font-family: var(--font-serif); margin: 1.5em 0 0.5em; }

/* 光标动画 */
.cursor {
  display: inline-block; width: 8px; height: 16px; background-color: var(--accent-claude);
  vertical-align: text-bottom; margin-left: 4px; animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* 输入区 */
.input-area {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 0 24px 32px;
  background: linear-gradient(0deg, var(--bg-main) 70%, transparent); display: flex; justify-content: center;
}
.input-box {
  width: 100%; max-width: 768px; background: white; border: 1px solid var(--border-light);
  border-radius: 16px; box-shadow: var(--shadow-float); padding: 12px 16px; display: flex; flex-direction: column;
  transition: border-color 0.2s;
}
.input-box:focus-within { border-color: var(--accent-claude); }
.input-box textarea {
  width: 100%; border: none; outline: none; resize: none; max-height: 200px;
  font-family: var(--font-sans); font-size: 15px; background: transparent; padding: 4px 0;
}
.input-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.btn-send {
  background-color: var(--accent-claude); color: white; border: none; border-radius: 8px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s; opacity: 0.5; pointer-events: none;
}
.btn-send.active { opacity: 1; pointer-events: auto; }
.btn-send.active:hover { background-color: var(--accent-hover); }

/* 设置弹窗 */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: none;
  align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px);
}
.modal.show { display: flex; }
.modal-content {
  background: var(--bg-main); width: 400px; border-radius: 16px; padding: 24px; box-shadow: var(--shadow-float);
}
.modal-content input {
  width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid var(--border-light); border-radius: 8px; outline: none;
}
.modal-content input:focus { border-color: var(--accent-claude); }
.btn-save {
  background: var(--text-primary); color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; width: 100%;
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-inner">
    <button class="btn-new" onclick="location.reload()">
      <div class="claude-icon">C</div>
      新对话
    </button>
    <div style="flex:1;"></div>
    <button class="btn-new" style="margin-bottom: 8px;" onclick="document.getElementById('settings').classList.add('show')">
      ⚙️ API 设置
    </button>
  </div>
</aside>

<main class="main-content">
  <div class="top-bar">
    <button class="btn-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="model-name" onclick="document.getElementById('settings').classList.add('show')" id="display-model">点击配置 API 模型</div>
  </div>

  <div class="chat-container" id="chat-container">
    <div class="chat-wrapper" id="chat-wrapper">
      <!-- 初始空白态 -->
      <div id="empty-state" style="text-align:center; margin-top:100px;">
        <div class="claude-icon" style="width:48px;height:48px;font-size:28px;margin:0 auto 16px;border-radius:12px;">C</div>
        <h2 style="font-family:var(--font-serif); font-weight:400;">你好，我是 Claude</h2>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="user-input" rows="1" placeholder="发送消息给 Claude..."></textarea>
      <div class="input-actions">
        <span style="font-size:12px; color:var(--text-secondary);">Enter 发送，Shift+Enter 换行</span>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </div>
</main>

<div class="modal" id="settings">
  <div class="modal-content">
    <h3 style="margin-bottom: 16px;">API 配置</h3>
    <label style="font-size:14px;color:var(--text-secondary);">API 代理地址 (需支持 CORS)</label>
    <input type="text" id="cfg-url" placeholder="例如：https://api.deepseek.com/v1/chat/completions">
    <label style="font-size:14px;color:var(--text-secondary);">API Key</label>
    <input type="password" id="cfg-key" placeholder="sk-...">
    <label style="font-size:14px;color:var(--text-secondary);">模型名称</label>
    <input type="text" id="cfg-model" placeholder="deepseek-chat 或 gpt-4o">
    <p style="font-size:12px;color:#D97757;margin-bottom:16px;">注意：纯前端直接请求官方 API 会被浏览器的跨域(CORS)机制拦截，建议使用中转 API。</p>
    <button class="btn-save" onclick="saveSettings()">保存配置</button>
  </div>
</div>

<script>
  let chatHistory = [];
  let isGenerating = false;
  let abortController = null;

  // 初始化设置
  function init() {
    document.getElementById('cfg-url').value = localStorage.getItem('cfg_url') || '';
    document.getElementById('cfg-key').value = localStorage.getItem('cfg_key') || '';
    document.getElementById('cfg-model').value = localStorage.getItem('cfg_model') || 'gpt-4o';
    document.getElementById('display-model').innerText = localStorage.getItem('cfg_model') || '配置模型';
  }
  init();

  function saveSettings() {
    localStorage.setItem('cfg_url', document.getElementById('cfg-url').value.trim());
    localStorage.setItem('cfg_key', document.getElementById('cfg-key').value.trim());
    localStorage.setItem('cfg_model', document.getElementById('cfg-model').value.trim());
    document.getElementById('display-model').innerText = document.getElementById('cfg-model').value.trim();
    document.getElementById('settings').classList.remove('show');
  }

  const input = document.getElementById('user-input');
  const btnSend = document.getElementById('btn-send');

  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    if(this.value.trim().length > 0) btnSend.classList.add('active');
    else btnSend.classList.remove('active');
  });

  input.addEventListener('keydown', function(e) {
    if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendMessage(role, text, id = '') {
    const wrapper = document.getElementById('chat-wrapper');
    const row = document.createElement('div');
    row.className = `msg-row msg-${role}`;

    if (role === 'user') {
      row.innerHTML = `<div class="bubble">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
    } else {
      row.innerHTML = `
        <div class="avatar">C</div>
        <div class="content" id="${id}">${text ? marked.parse(text) : '<span class="cursor"></span>'}</div>
      `;
    }
    wrapper.appendChild(row);
    scrollToBottom();
  }

  function scrollToBottom() {
    const container = document.getElementById('chat-container');
    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
  }

  async function sendMessage() {
    if (isGenerating) return;
    const text = input.value.trim();
    if (!text) return;

    const url = localStorage.getItem('cfg_url');
    const key = localStorage.getItem('cfg_key');
    const model = localStorage.getItem('cfg_model');

    if (!url || !key) {
      document.getElementById('settings').classList.add('show');
      return;
    }

    document.getElementById('empty-state').style.display = 'none';
    input.value = '';
    input.style.height = 'auto';
    btnSend.classList.remove('active');

    chatHistory.push({ role: 'user', content: text });
    appendMessage('user', text);

    const aiId = 'ai-' + Date.now();
    appendMessage('ai', '', aiId);
    const aiContentDiv = document.getElementById(aiId);

    isGenerating = true;
    abortController = new AbortController();
    let fullResponse = "";

    try {
      // 默认按 OpenAI 标准格式发送 (兼容大多数中转站和开源模型)
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model: model, messages: chatHistory, stream: true }),
        signal: abortController.signal
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: API拒绝请求。如果你使用了官方API，这通常是因为浏览器CORS跨域拦截，请使用API中转服务。`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const dataStr = line.slice(6).trim();
            if (dataStr === '[DONE]') continue;
            try {
              const data = JSON.parse(dataStr);
              const delta = data.choices[0]?.delta?.content || "";
              fullResponse += delta;
              aiContentDiv.innerHTML = marked.parse(fullResponse) + '<span class="cursor"></span>';
              scrollToBottom();
            } catch (e) {}
          }
        }
      }
    } catch (error) {
      if (error.name !== 'AbortError') {
        fullResponse = `**系统错误：** \n\n${error.message}\n\n*技术说明：前端直连官方 API（如 api.deepseek.com / api.openai.com）大概率会遇到跨域问题。建议填入支持跨域的 API 代理（如 api.siliconflow.cn 等中转平台）。*`;
      }
    } finally {
      aiContentDiv.innerHTML = marked.parse(fullResponse);
      chatHistory.push({ role: 'assistant', content: fullResponse });
      isGenerating = false;
    }
  }
</script>
</body>
</html>
